<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCOA - Simulation Results Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #1E293B 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.95;
            margin-bottom: 20px;
        }

        .paper-link {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .paper-link:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .simulation-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .simulation-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .view-tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            overflow-x: auto;
        }

        .view-tab {
            flex: 1;
            min-width: 100px;
            background: #f5f5f5;
            border: none;
            padding: 12px 15px;
            cursor: pointer;
            font-size: 0.9em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .view-tab:hover {
            background: #efefef;
        }

        .view-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .card-media {
            width: 100%;
            height: 250px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-controls-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .simulation-card:hover .video-controls-hint {
            opacity: 1;
        }

        .view-description {
            font-size: 0.8em;
            color: #999;
            padding: 5px 0;
            margin-top: 5px;
            font-style: italic;
        }

        .card-content {
            padding: 25px;
        }

        .card-content h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #333;
        }

        .card-content p {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .card-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .meta-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: #666;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
            }

            .view-tab {
                flex: 1;
                padding: 10px 8px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 RCOA Simulations</h1>
            <p>Relaxed Nonconvex Obstacle Avoidance</p>
            <a href="https://github.com/rtapia8484/RCOA" class="paper-link">📄 View on GitHub</a>
        </header>

        <div class="filters">
            <button class="filter-btn active" onclick="filterGallery('all')">All Scenarios</button>
            <button class="filter-btn" onclick="filterGallery('dense')">Dense Obstacles</button>
            <button class="filter-btn" onclick="filterGallery('narrow')">Narrow Passages</button>
        </div>

        <div class="gallery" id="gallery">
            <div class="empty-state">
                <h2>📂 No simulations yet</h2>
                <p>Check back soon! Add simulation results to the <code>/simulations</code> folder.</p>
            </div>
        </div>

        <footer>
            <p>RCOA Simulation Results Gallery | Last updated: 2026-07-20</p>
        </footer>
    </div>

    <script>
        // Simulation data structure with multiple views support
        const simulations = [
            {
                id: 1,
                title: "Dense Obstacle Environment",
                description: "Robot navigating through densely packed obstacles using RCOA formulation",
                category: "dense",
                date: "2026-07-20",
                views: [
                    {
                        name: "Front View",
                        video: "simulations/Narrow Passage/NarrowPassage_FrontView.mp4",
                        description: "Bird's eye view of the robot's trajectory"
                    },
                    {
                        name: "Top View",
                        video: "simulations/Narrow Passage/NarrowPassage_TopView.mp4",
                        description: "Side perspective showing obstacle clearance"
                    }
                ],
                tags: ["Dense", "Complex"],
                environment: "Indoor"
            },
            {
                id: 2,
                title: "Narrow Passage Navigation",
                description: "Successfully navigating through narrow passages with minimal clearance",
                category: "narrow",
                date: "2026-07-20",
                views: [
                    {
                        name: "Main View",
                        video: "simulations/scenario_2/results.mp4",
                        description: "Primary visualization of narrow passage navigation"
                    }
                ],
                tags: ["Narrow", "Challenging"],
                environment: "Corridor"
            }
        ];

        function renderGallery(filter = 'all') {
            const gallery = document.getElementById('gallery');
            const filtered = filter === 'all' 
                ? simulations 
                : simulations.filter(sim => sim.category === filter);

            if (filtered.length === 0) {
                gallery.innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="empty-state">
                            <h2>No simulations found</h2>
                            <p>Try a different filter or check back later.</p>
                        </div>
                    </div>
                `;
                return;
            }

            gallery.innerHTML = filtered.map(sim => {
                const hasMultipleViews = sim.views && sim.views.length > 1;
                const firstView = sim.views[0];
                
                return `
                    <div class="simulation-card" data-sim-id="${sim.id}">
                        ${hasMultipleViews ? `
                            <div class="view-tabs">
                                ${sim.views.map((view, idx) => `
                                    <button class="view-tab ${idx === 0 ? 'active' : ''}" 
                                            onclick="switchView(${sim.id}, ${idx})">
                                        ${view.name}
                                    </button>
                                `).join('')}
                            </div>
                        ` : ''}
                        <div class="card-media">
                            <video id="video-${sim.id}" controls muted>
                                <source src="${firstView.video}" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                            <div class="video-controls-hint">▶ Click to play</div>
                        </div>
                        ${hasMultipleViews ? `
                            <div style="padding: 0 25px 10px;">
                                <div class="view-description" id="view-desc-${sim.id}">
                                    ${firstView.description}
                                </div>
                            </div>
                        ` : ''}
                        <div class="card-content">
                            <h3>${sim.title}</h3>
                            <p>${sim.description}</p>
                            <div class="card-meta">
                                <span class="meta-tag">📍 ${sim.environment}</span>
                                <span class="meta-tag">📅 ${sim.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchView(simId, viewIndex) {
            const simulation = simulations.find(s => s.id === simId);
            if (!simulation || !simulation.views[viewIndex]) return;

            const view = simulation.views[viewIndex];
            const videoElement = document.getElementById(`video-${simId}`);
            const descElement = document.getElementById(`view-desc-${simId}`);

            // Update video source
            videoElement.src = view.video;
            videoElement.load();

            // Update description if exists
            if (descElement) {
                descElement.textContent = view.description;
            }

            // Update active tab styling
            const card = document.querySelector(`[data-sim-id="${simId}"]`);
            const tabs = card.querySelectorAll('.view-tab');
            tabs.forEach((tab, idx) => {
                tab.classList.toggle('active', idx === viewIndex);
            });
        }

        function filterGallery(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGallery(category);
        }

        // Initial render
        renderGallery();

        // Load simulations from metadata files (future enhancement)
        async function loadSimulations() {
            try {
                // This will be populated as you add metadata.json files
                // Example implementation:
                // const response = await fetch('simulations/manifest.json');
                // const data = await response.json();
                // This would dynamically load all scenarios
            } catch (error) {
                console.log('Manifest not found yet. Using default simulations.');
            }
        }

        loadSimulations();
    </script>
</body>
</html>
